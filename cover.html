<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cover - Ebook Hadits</title>
    <style>
        body {
            background: radial-gradient(circle, #f9f6f0 0%, #e2d1b4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .cover-card {
            background-color: #ffffff;
            border: 15px double #0c341e;
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 4px;
        }
        .ornament { color: #0c341e; font-size: 2rem; margin-bottom: 10px; }
        h1 { color: #0c341e; font-size: 3rem; margin: 0; letter-spacing: 3px; font-weight: 800; }
        .subtitle { font-size: 1.1rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin: 10px 0; }
        h2 { color: #14492b; font-size: 2.2rem; margin: 10px 0; font-weight: 700; }
        .and { font-style: italic; color: #c2a661; font-size: 1.2rem; margin: 5px 0; }
        .tagline { font-size: 0.9rem; color: #555; border-top: 1px solid #c2a661; border-bottom: 1px solid #c2a661; padding: 10px 0; margin: 30px 0; }
        .target { background: #0c341e; color: #f4e8c1; padding: 10px; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="cover-card">
        <div class="ornament">❖</div>
        <h1>HADITS</h1>
        <div class="subtitle">— TENTANG —</div>
        <h2>PENDIDIKAN AKHLAK</h2>
        <div class="and">dan</div>
        <h2>PENDIDIKAN SOSIAL</h2>
        <div class="tagline">HIMPUNAN HADITS PILIHAN DILENGKAPI TERJEMAHAN</div>
        <div class="target">UNTUK PELAJAR, PENDIDIK, DAN MASYARAKAT UMUM</div>
    </div>
</body>
</html>
